  <style>
    :root {
      --theme-color: #8E4585; /* Default theme color */
    }

    #colorlib-aside a {
      text-decoration: none !important;
      border: none !important;
      color: var(--theme-color) !important; /* Apply theme color to links */
    }

    .ftco-social a span {

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.9rem;
      margin-top: 1.25rem;
    }

    .slides-container {
      max-width: 100%;
    }

    .tile {
      text-align: center;
      padding: 0.55rem;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .tile:hover,
    .tile:focus-within {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--theme-color) 38%, transparent);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .slide-preview {
      display: flex;
      aspect-ratio: 16 / 9;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--theme-color);
      text-decoration: none !important;
    }

    .slide-preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide-preview i {
      font-size: 2.6rem;
      opacity: 0.9;
    }

    .caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.45rem;
      margin-top: 0.55rem;
      font-family: "Montserrat", Arial, sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(0, 0, 0, 0.62);
      text-align: left;
    }

    .slide-actions {
      display: inline-flex;
      flex: 0 0 auto;
      gap: 0.25rem;
    }

    .slide-action {
      display: inline-flex;
      width: 1.65rem;
      height: 1.55rem;
      align-items: center;
      justify-content: center;
      border: 1px solid color-mix(in srgb, var(--theme-color) 24%, transparent) !important;
      border-radius: 5px;
      background: color-mix(in srgb, var(--theme-color) 7%, transparent);
      color: var(--theme-color) !important;
      text-decoration: none !important;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .slide-action:hover,
    .slide-action:focus {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--theme-color) 42%, transparent) !important;
      background: color-mix(in srgb, var(--theme-color) 13%, transparent);
    }

    body.dark-theme .tile {
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.045);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    body.dark-theme .tile:hover,
    body.dark-theme .tile:focus-within {
      border-color: color-mix(in srgb, var(--theme-color) 46%, transparent);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.34);
    }

    body.dark-theme .slide-preview {
      border-color: rgba(255, 255, 255, 0.09);
      background: rgba(255, 255, 255, 0.92);
    }

    body.dark-theme .caption {
      color: rgba(216, 210, 200, 0.72) !important;
    }

    body.dark-theme .slide-action {
      border-color: color-mix(in srgb, var(--theme-color) 34%, transparent) !important;
      background: color-mix(in srgb, var(--theme-color) 12%, transparent);
    }

    @media (max-width: 1199.98px) {
      .gallery {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 767.98px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 575.98px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script>
    (function() {
        const colors = ['#9582c4', '#ce5c5c', '#949efb', '#81a55f', '#de5d83', '#75c6d9', '#008080'];
        const today = new Date();
        const colorIndex = today.getDate() % colors.length;
        const todayColor = colors[colorIndex];
        document.documentElement.style.setProperty('--theme-color', todayColor);
        console.log('Today\'s theme color:', todayColor);
    })();
